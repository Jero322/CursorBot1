<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CursorBot — Arduino Translator</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>CursorBot — Arduino Translator</h1>

      <label for="prompt">Describe what you want the robot to do</label>
      <textarea id="prompt" placeholder="e.g. Move forward for 2 seconds"></textarea>

      <div class="buttons">
        <button id="generate">Generate Code</button>
        <button id="download" disabled>Download .ino</button>
        <button id="upload" disabled>Upload to Board</button>
      </div>

      <h2>Generated Code</h2>
      <pre id="code">No code generated yet.</pre>

      <div id="upload-form" class="hidden">
        <h3>Upload settings</h3>
        <label>Port: <input id="port" placeholder="/dev/tty.usbmodem..." /></label>
        <label>Board FQBN: <input id="fqbn" placeholder="arduino:avr:uno" /></label>
        <button id="do-upload">Upload Now</button>
      </div>

      <div id="status"></div>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>
