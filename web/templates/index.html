<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CursorBot — Arduino Translator</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <span class="logo">🤖</span>
        <div>
          <h1>CursorBot</h1>
          <p class="tagline">Arduino Code Translator</p>
        </div>
      </div>
    </header>

    <main>
      <div class="card prompt-card">
        <label for="prompt">Describe what you want your robot to do</label>
        <textarea id="prompt" placeholder="e.g. Move forward for 2 seconds, turn left, then stop"></textarea>
        <div class="buttons">
          <button type="button" id="generate" class="btn btn-primary">&#9654; Generate Code</button>
          <button type="button" id="download" class="btn btn-secondary" disabled>&#8595; Download .ino</button>
          <button type="button" id="upload"   class="btn btn-secondary">&#8593; Upload to Board</button>
        </div>
      </div>

      <div class="card code-card">
        <div class="code-header">
          <span class="code-title">Generated Code</span>
          <span class="code-lang">Arduino .ino</span>
        </div>
        <pre id="code">// Your generated Arduino code will appear here...</pre>
      </div>

      <div id="upload-form" class="card upload-card hidden">
        <h3>&#128268; Upload to Arduino</h3>
        <p class="hint">Connect your board via USB first. If no port appears, install
          <a href="https://arduino.github.io/arduino-cli/" target="_blank" rel="noopener">arduino-cli</a>
          and run <code>arduino-cli core install arduino:avr</code>, then click Refresh.</p>

        <div class="field">
          <span class="field-label">Port</span>
          <div class="input-row">
            <select id="port-select"><option value="">— detecting... —</option></select>
            <input id="port" type="text" placeholder="/dev/cu.usbserial-110" />
            <button type="button" id="refresh-ports" class="btn btn-sm">&#8635; Refresh</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">Board FQBN</span>
          <input id="fqbn" type="text" placeholder="arduino:avr:uno" />
        </div>

        <div class="upload-actions">
          <button type="button" id="do-upload" class="btn btn-upload">&#9650; Upload Now</button>
        </div>
      </div>

      <div id="status"></div>
    </main>

    <script src="/static/main.js"></script>
  </body>
</html>
